<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Potree Point Cloud Viewer</title>
  <link rel="stylesheet" href="/third_party/potree/build/potree/potree.css">
  <link rel="stylesheet" href="/third_party/potree/libs/jquery-ui/jquery-ui.min.css">
  <link rel="stylesheet" href="/third_party/potree/libs/openlayers3/ol.css">
  <link rel="stylesheet" href="/third_party/potree/libs/spectrum/spectrum.css">
  <link rel="stylesheet" href="/third_party/potree/libs/jstree/themes/mixed/style.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0e1117;
    }
    .topbar {
      position: absolute;
      z-index: 10;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 6px;
      background: rgba(14, 17, 23, 0.86);
      color: #eef1f5;
      font: 12px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .topbar input {
      width: 120px;
      border: 1px solid #303642;
      border-radius: 4px;
      background: #181b22;
      color: #eef1f5;
      padding: 4px 6px;
      font: inherit;
    }
    .topbar button {
      border: 1px solid #303642;
      border-radius: 4px;
      background: #243140;
      color: #eef1f5;
      padding: 4px 8px;
      font: inherit;
      cursor: pointer;
    }
    #status {
      color: #9aa3af;
      max-width: 560px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <script src="/third_party/potree/libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="/third_party/potree/libs/spectrum/spectrum.js"></script>
  <script src="/third_party/potree/libs/jquery-ui/jquery-ui.min.js"></script>
  <script src="/third_party/potree/libs/other/BinaryHeap.js"></script>
  <script src="/third_party/potree/libs/tween/tween.min.js"></script>
  <script src="/third_party/potree/libs/d3/d3.js"></script>
  <script src="/third_party/potree/libs/proj4/proj4.js"></script>
  <script src="/third_party/potree/libs/openlayers3/ol.js"></script>
  <script src="/third_party/potree/libs/i18next/i18next.js"></script>
  <script src="/third_party/potree/libs/jstree/jstree.js"></script>
  <script src="/third_party/potree/build/potree/potree.js"></script>
  <script src="/third_party/potree/libs/plasio/js/laslaz.js"></script>

  <div class="topbar">
    <span>Potree</span>
    <label>点预算 <input id="budget" type="number" min="100000" step="100000" value="1500000"></label>
    <label>点大小 <input id="pointSize" type="number" min="0.2" step="0.1" value="1.0"></label>
    <button id="viewIso">斜视</button>
    <button id="viewTop">顶视</button>
    <button id="viewFront">前视</button>
    <button id="viewSide">侧视</button>
    <span id="status"></span>
  </div>

  <div class="potree_container" style="position:absolute; width:100%; height:100%; left:0; top:0;">
    <div id="potree_render_area" style="background:#0e1117;"></div>
    <div id="potree_sidebar_container"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    // Potree 1.8 tries to parse "pointSize" during Viewer construction and
    // calls a missing setPointSize() method. Keep our UI parameter under
    // "size", while accepting old links and removing the unsafe parameter
    // before Potree reads window.location.
    const legacyPointSize = params.get("pointSize");
    if (legacyPointSize !== null) {
      params.set("size", legacyPointSize);
      params.delete("pointSize");
      const sanitized = `${window.location.pathname}?${params.toString()}${window.location.hash}`;
      window.history.replaceState(null, "", sanitized);
    }
    const cloudUrl = params.get("cloud") || params.get("metadata");
    const name = params.get("name") || "pointcloud";
    const statusEl = document.querySelector("#status");
    const budgetEl = document.querySelector("#budget");
    const pointSizeEl = document.querySelector("#pointSize");
    const viewIsoEl = document.querySelector("#viewIso");
    const viewTopEl = document.querySelector("#viewTop");
    const viewFrontEl = document.querySelector("#viewFront");
    const viewSideEl = document.querySelector("#viewSide");
    let sceneBounds = null;

    async function loadSceneBounds(url) {
      const response = await fetch(url, { cache: "no-store" });
      const metadata = await response.json();
      const position = (metadata.attributes || []).find(attr => attr.name === "position");
      const min = position?.min || metadata.boundingBox?.min;
      const max = position?.max || metadata.boundingBox?.max;
      if (!min || !max) return null;
      const center = [
        (Number(min[0]) + Number(max[0])) / 2,
        (Number(min[1]) + Number(max[1])) / 2,
        (Number(min[2]) + Number(max[2])) / 2,
      ];
      const size = [
        Number(max[0]) - Number(min[0]),
        Number(max[1]) - Number(min[1]),
        Number(max[2]) - Number(min[2]),
      ];
      const radius = Math.max(size[0], size[1], size[2], 1);
      return { min, max, center, size, radius };
    }

    function setViewPreset(preset, duration = 0) {
      if (!sceneBounds) {
        viewer.fitToScreen();
        return;
      }
      const [cx, cy, cz] = sceneBounds.center;
      const r = sceneBounds.radius;
      const views = {
        iso: [cx + r * 0.85, cy - r * 1.15, cz + r * 0.75],
        top: [cx, cy, cz + r * 1.6],
        front: [cx, cy - r * 1.7, cz + r * 0.15],
        side: [cx + r * 1.7, cy, cz + r * 0.15],
      };
      const pos = views[preset] || views.iso;
      viewer.scene.view.setView(pos, sceneBounds.center, duration);
      viewer.setMoveSpeed(r / 2);
    }

    const budget = Number(params.get("budget"));
    if (Number.isFinite(budget) && budget > 0) budgetEl.value = String(Math.floor(budget));
    const pointSize = Number(params.get("size"));
    if (Number.isFinite(pointSize) && pointSize > 0) pointSizeEl.value = String(pointSize);

    window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
    viewer.setEDLEnabled(false);
    viewer.setFOV(60);
    viewer.setPointBudget(Number(budgetEl.value));
    viewer.setBackground("black");
    viewer.setDescription("SCAN Potree viewer");

    viewer.loadGUI(() => {
      viewer.setLanguage("en");
      viewer.toggleSidebar();
    });

    budgetEl.addEventListener("change", () => {
      viewer.setPointBudget(Math.max(100000, Number(budgetEl.value) || 1500000));
    });

    viewIsoEl.addEventListener("click", () => setViewPreset("iso", 400));
    viewTopEl.addEventListener("click", () => setViewPreset("top", 400));
    viewFrontEl.addEventListener("click", () => setViewPreset("front", 400));
    viewSideEl.addEventListener("click", () => setViewPreset("side", 400));

    if (!cloudUrl) {
      statusEl.textContent = "缺少 ?cloud=/path/to/metadata.json";
    } else {
      statusEl.textContent = `加载 ${cloudUrl}`;
      Potree.loadPointCloud(cloudUrl, name, event => {
        const pointcloud = event.pointcloud;
        const material = pointcloud.material;
        material.size = Number(pointSizeEl.value) || 1.0;
        material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
        material.shape = Potree.PointShape.SQUARE;
        material.activeAttributeName = "rgba";
        viewer.scene.addPointCloud(pointcloud);
        loadSceneBounds(cloudUrl).then(bounds => {
          sceneBounds = bounds;
          setViewPreset(params.get("view") || "iso");
          statusEl.textContent = `${name}: ${cloudUrl}`;
        }).catch(err => {
          viewer.fitToScreen();
          statusEl.textContent = `${name}: ${cloudUrl}；bounds 加载失败: ${err.message}`;
        });

        pointSizeEl.addEventListener("change", () => {
          material.size = Math.max(0.2, Number(pointSizeEl.value) || 1.0);
        });
      });
    }
  </script>
</body>
</html>
