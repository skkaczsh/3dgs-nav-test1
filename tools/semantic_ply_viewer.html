<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>语义点云 / Object Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #181b22;
      --panel-2: #20242d;
      --text: #eef1f5;
      --muted: #9aa3af;
      --line: #303642;
      --accent: #42b8d8;
      --warn: #f0b84f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: 100vh;
      min-width: 920px;
    }
    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      overflow: auto;
      padding: 14px;
    }
    main {
      position: relative;
      min-width: 0;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: 0;
    }
    h2 {
      margin: 18px 0 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    label {
      display: block;
      margin: 10px 0 4px;
      color: var(--muted);
      font-size: 12px;
    }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 9px;
      font: inherit;
    }
    input[type="range"] { padding: 0; }
    button {
      cursor: pointer;
      background: #243140;
    }
    button:hover { border-color: var(--accent); }
    .drop {
      display: grid;
      place-items: center;
      min-height: 94px;
      padding: 12px;
      border: 1px dashed #4b5563;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: #151922;
    }
    .drop.drag { border-color: var(--accent); color: var(--text); }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stats, .details, .legend {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #151922;
      padding: 10px;
    }
    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 6px;
      margin: 3px 0;
      word-break: break-word;
    }
    .kv span:first-child { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      margin: 3px 4px 3px 0;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #10141b;
      color: var(--text);
      white-space: nowrap;
    }
    .swatch {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-radius: 2px;
      background: var(--accent);
    }
    #viewport {
      position: absolute;
      inset: 0;
    }
    #hud {
      position: absolute;
      right: 12px;
      bottom: 12px;
      max-width: min(460px, calc(100vw - 380px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 19, 24, 0.9);
      padding: 10px 12px;
      color: var(--muted);
      pointer-events: none;
    }
    .warn { color: var(--warn); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
  <div id="app">
    <aside>
      <h1>语义点云 / Object Viewer</h1>
      <div id="drop" class="drop">
        拖入 ASCII PLY 和可选 objects JSONL<br>
        <span class="mono">x y z red green blue object semantic frame</span>
      </div>
      <input id="file" type="file" accept=".ply,.jsonl,.json,.txt" multiple>

      <h2>显示</h2>
      <label for="colorMode">颜色模式</label>
      <select id="colorMode">
        <option value="rgb">PLY RGB / object 均色</option>
        <option value="semantic">语义标签</option>
        <option value="object">Object ID</option>
        <option value="status">Object 状态</option>
      </select>
      <div class="row">
        <div>
          <label for="pointSize">点大小</label>
          <input id="pointSize" type="range" min="1" max="8" step="0.5" value="2">
        </div>
        <div>
          <label for="sampleStride">采样步长</label>
          <input id="sampleStride" type="number" min="1" value="1">
        </div>
      </div>
      <label for="maxVisiblePoints">最大显示点数</label>
      <select id="maxVisiblePoints">
        <option value="150000">150k / 低功耗</option>
        <option value="300000" selected>300k / 推荐</option>
        <option value="600000">600k / 细查</option>
        <option value="1200000">1.2M / 高负载</option>
        <option value="0">无限制 / 不推荐</option>
      </select>
      <label for="labelFilter">标签筛选</label>
      <select id="labelFilter"><option value="">全部标签</option></select>
      <label for="objectFilter">Object ID 筛选</label>
      <input id="objectFilter" type="text" placeholder="例如 1742 或 obj_001742">
      <div class="row">
        <button id="fit">适配视图</button>
        <button id="resetFilter">清除筛选</button>
      </div>

      <h2>统计</h2>
      <div id="stats" class="stats">尚未加载文件。</div>

      <h2>选中点 / 对象</h2>
      <div id="details" class="details">点击点云查看 object 与标签。</div>

      <h2>图例</h2>
      <div id="legend" class="legend"></div>
    </aside>
    <main>
      <div id="viewport"></div>
      <div id="hud">左键拖拽旋转，滚轮缩放，右键拖拽平移。点击点查看标签 / object。</div>
    </main>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.166.1/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.166.1/examples/jsm/controls/OrbitControls.js";

    const LABELS = {
      0: "unknown", 1: "other", 2: "wall", 3: "floor", 4: "ceiling", 5: "grass", 6: "tree",
      7: "person", 8: "car", 9: "railing", 10: "building", 11: "sky", 12: "road",
      13: "water", 14: "furniture", 15: "pipe", 16: "equipment", 17: "fine_candidate",
      18: "stair", 19: "indoor_floor", 20: "roof", 255: "ignore"
    };
    const LABEL_IDS = Object.fromEntries(Object.entries(LABELS).map(([k, v]) => [v, Number(k)]));
    const REJECTED_ARTIFACT_SUBSTRINGS = [
      "objects_v12_teacher_v20_grid6_unknown_absorb",
      "objects_v14_teacher_v20_grid6_geometry_guard_wall_recall",
      "objects_v15_teacher_v20_grid6_geometry_guard_no_wall_to_floor",
      "objects_v16_teacher_v20_grid6_geometry_guard_surface_recall"
    ];
    const LABEL_ZH = {
      unknown: "未知", other: "其他", wall: "墙面", floor: "地面", ceiling: "天花板",
      grass: "草地", tree: "树木", person: "人", car: "汽车", railing: "栏杆/护栏",
      building: "建筑", sky: "天空", road: "路面", water: "水体", furniture: "家具",
      pipe: "管线", equipment: "设备", fine_candidate: "细目标候选",
      stair: "楼梯", indoor_floor: "室内地面", roof: "屋顶/平台", ignore: "忽略", ambiguous: "模糊"
    };
    const LABEL_COLORS = {
      unknown: [150, 150, 150], other: [180, 180, 180], wall: [120, 150, 180], floor: [196, 168, 112],
      ceiling: [170, 170, 210], grass: [80, 160, 80], tree: [50, 130, 70], person: [230, 80, 80],
      car: [235, 90, 80], railing: [240, 210, 60], building: [145, 145, 160], sky: [70, 150, 220],
      road: [120, 120, 120], water: [50, 120, 200], furniture: [180, 100, 200], pipe: [220, 160, 60],
      equipment: [210, 90, 210], fine_candidate: [245, 150, 40],
      stair: [245, 125, 60], indoor_floor: [105, 180, 210], roof: [165, 145, 210],
      ignore: [40, 40, 40], ambiguous: [150, 150, 150]
    };
    const STATUS_COLORS = {
      stable: [80, 190, 130],
      single_target: [80, 150, 230],
      ambiguous_object: [230, 40, 210]
    };
    const STATUS_ZH = {
      stable: "稳定对象",
      single_target: "单 target 对象",
      ambiguous_object: "模糊对象",
      needs_semantic_review: "待语义复审",
      priority_car_object: "优先层: 汽车",
      priority_railing_object: "优先层: 栏杆/护栏",
      priority_grass_object: "优先层: 草地",
      priority_ground_object: "优先层: 地面",
      priority_wall_object: "优先层: 墙面",
      absorbed_by_drivability_ground: "并入地面: 可通行先验",
      absorbed_by_drivability_ground_fragment: "并入地面: 地面碎片",
      absorbed_by_drivability_ground_loose: "并入地面: 宽松先验",
      absorbed_by_drivability_ground_contaminated: "并入地面: 混杂但地面占优",
      absorbed_by_geometry_ground_unmatched: "并入地面: 几何兜底",
      absorbed_by_drivability_wall: "并入墙面: 墙面先验",
      absorbed_by_drivability_wall_loose: "并入墙面: 宽松先验",
      priority_car_needs_visual_review: "汽车候选: 待视觉复审",
      priority_railing_needs_visual_review: "栏杆候选: 待视觉复审",
      priority_car_geometry_plausible: "汽车候选: 几何可信",
      priority_railing_geometry_plausible: "栏杆候选: 几何可信",
      priority_geometry_rejected: "Priority 候选: 几何拒绝"
    };
    const DOWNSTREAM_ZH = {
      stable_surface: "稳定大面",
      stable_context_object: "稳定场景目标",
      dino_fine_object_review: "DINO 细目标复审",
      fine_semantic_review: "细目标语义复审",
      geometry_review: "几何复审"
    };
    const REVIEW_PRIORITY_ZH = { high: "高", medium: "中", low: "低" };
    const PRIORITY_GUARD_ZH = {
      geometry_plausible: "几何可信",
      needs_visual_review: "待视觉复审",
      geometry_rejected: "几何拒绝"
    };
    const VISUAL_REVIEW_ZH = {
      visual_confirmed: "视觉确认",
      visual_weak: "弱视觉证据",
      visual_not_detected: "视觉未检出",
      missing_crop: "缺少 crop"
    };
    const GEOMETRY_QUALITY_ZH = {
      clean: "几何清晰",
      unclassified_candidate: "未分类候选",
      mixed_or_overmerged: "混杂/过合并"
    };
    const SCENE_CONTEXT_ZH = {
      outdoor_parking_ground_or_pavement: "室外停车场地面/铺装",
      upper_level_floor_or_deck: "上层平台/楼板",
      building_or_indoor_wall_surface: "建筑/室内墙面",
      parking_lot_vegetation: "停车场植被",
      parked_vehicle_candidate: "停放车辆候选",
      guardrail_or_fence_candidate: "护栏/围栏候选",
      residual_object_candidate_after_surface_removal: "大面剔除后的剩余候选"
    };

    const viewport = document.querySelector("#viewport");
    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "low-power" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.25));
    renderer.setClearColor(0x0e1117, 1);
    viewport.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 10000);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const grid = new THREE.GridHelper(20, 20, 0x2d3748, 0x1f2937);
    grid.rotation.x = Math.PI / 2;
    scene.add(grid);
    scene.add(new THREE.AmbientLight(0xffffff, 1));

    let pointsObject = null;
    let rawRows = [];
    let filteredIndices = [];
    let bounds = null;
    let lastCandidateCount = 0;
    let lastPointBudgetStride = 1;

    const els = {
      file: document.querySelector("#file"),
      drop: document.querySelector("#drop"),
      colorMode: document.querySelector("#colorMode"),
      pointSize: document.querySelector("#pointSize"),
      sampleStride: document.querySelector("#sampleStride"),
      maxVisiblePoints: document.querySelector("#maxVisiblePoints"),
      labelFilter: document.querySelector("#labelFilter"),
      objectFilter: document.querySelector("#objectFilter"),
      fit: document.querySelector("#fit"),
      resetFilter: document.querySelector("#resetFilter"),
      stats: document.querySelector("#stats"),
      details: document.querySelector("#details"),
      legend: document.querySelector("#legend")
    };

    function hashColor(value) {
      let h = 2166136261;
      const s = String(value ?? "");
      for (let i = 0; i < s.length; i++) h = Math.imul(h ^ s.charCodeAt(i), 16777619);
      return [(h >>> 0) & 255, (h >>> 8) & 255, (h >>> 16) & 255].map(v => 70 + (v % 170));
    }

    function colorForRow(row, mode) {
      if (mode === "semantic") return LABEL_COLORS[row.label] || LABEL_COLORS.unknown;
      if (mode === "object") return hashColor(row.objectId);
      if (mode === "status") return STATUS_COLORS[row.status] || [150, 150, 150];
      return row.rgb || LABEL_COLORS[row.label] || LABEL_COLORS.unknown;
    }

    function labelFromSemantic(value) {
      const n = Number(value);
      return LABELS[n] || String(value || "unknown");
    }

    function displayLabel(value) {
      const raw = String(value || "unknown");
      return LABEL_ZH[raw] || raw;
    }

    function displayStatus(value) {
      const raw = String(value || "");
      return raw ? (STATUS_ZH[raw] || raw) : "";
    }

    function displayDownstream(value) {
      const raw = String(value || "");
      return raw ? (DOWNSTREAM_ZH[raw] || raw) : "";
    }

    function displayReviewPriority(value) {
      const raw = String(value || "");
      return raw ? (REVIEW_PRIORITY_ZH[raw] || raw) : "";
    }

    function displayGeometryQuality(value) {
      const raw = String(value || "");
      return raw ? (GEOMETRY_QUALITY_ZH[raw] || raw) : "";
    }

    function displayPriorityGuard(value) {
      const raw = String(value || "");
      return raw ? (PRIORITY_GUARD_ZH[raw] || raw) : "";
    }

    function displayVisualReview(value) {
      const raw = String(value || "");
      return raw ? (VISUAL_REVIEW_ZH[raw] || raw) : "";
    }

    function displaySceneContext(value) {
      const raw = String(value || "");
      return raw ? (SCENE_CONTEXT_ZH[raw] || raw) : "";
    }

    function displayPromptGroup(value) {
      const raw = String(value || "");
      return raw ? displayLabel(raw) : "";
    }

    function displayLabelVotes(votes) {
      if (!votes || !Object.keys(votes).length) return "";
      return Object.entries(votes)
        .map(([label, count]) => `${displayLabel(label)} ${count}`)
        .join(", ");
    }

    function displayDescriptionVotes(votes) {
      if (!votes || !Object.keys(votes).length) return "";
      return Object.entries(votes)
        .map(([label, count]) => `${label} ${count}`)
        .join(", ");
    }

    function objectKeys(value) {
      const raw = String(value ?? "").trim();
      if (!raw) return [];
      const keys = new Set([raw]);
      const match = raw.match(/^(?:global_)?obj_0*(\d+)$/i);
      if (match) keys.add(match[1]);
      if (/^\d+$/.test(raw)) {
        keys.add(`obj_${String(Number(raw)).padStart(6, "0")}`);
        keys.add(`global_obj_${String(Number(raw)).padStart(6, "0")}`);
        keys.add(String(Number(raw)));
      }
      return [...keys];
    }

    function buildObjectMetadata(rows) {
      const map = new Map();
      for (const row of rows) {
        if (row.source !== "objects_jsonl") continue;
        for (const key of objectKeys(row.objectId)) map.set(key, row);
      }
      return map;
    }

    function enrichPointRows(pointRows, objectRows) {
      const metadata = buildObjectMetadata(objectRows);
      if (!metadata.size) return pointRows;
      return pointRows.map(row => {
        let meta = null;
        for (const key of objectKeys(row.objectId)) {
          if (metadata.has(key)) {
            meta = metadata.get(key);
            break;
          }
        }
        if (!meta) return row;
        return {
          ...row,
          status: row.status || meta.status,
          pointCount: meta.pointCount,
          targetCount: meta.targetCount,
          dominantLabelRatio: meta.dominantLabelRatio,
          labelVotes: meta.labelVotes,
          description: meta.description,
          displayIdentity: meta.displayIdentity,
          refineReason: meta.refineReason,
          semanticLabelOriginal: meta.semanticLabelOriginal,
          parentObjectId: meta.parentObjectId,
          reviewLabel: meta.reviewLabel,
          reviewStatus: meta.reviewStatus,
          reviewReasons: meta.reviewReasons,
          candidateLabel: meta.candidateLabel,
          geometryClass: meta.geometryClass,
          imageEvidenceCount: meta.imageEvidenceCount,
          bestEvidence: meta.bestEvidence,
          geometryStats: meta.geometryStats,
          descriptionVoteRatio: meta.descriptionVoteRatio,
          descriptionVotes: meta.descriptionVotes,
          identityHint: meta.identityHint,
          attributes: meta.attributes,
          sceneContext: meta.sceneContext,
          sceneDescription: meta.sceneDescription,
          heightLayer: meta.heightLayer,
          geometryQuality: meta.geometryQuality,
          geometryFlags: meta.geometryFlags,
          downstreamStage: meta.downstreamStage,
          reviewPriority: meta.reviewPriority,
          dinoPromptGroup: meta.dinoPromptGroup,
          dinoPrompts: meta.dinoPrompts,
          priorityGuardStatus: meta.priorityGuardStatus,
          priorityGuardReasons: meta.priorityGuardReasons,
          evidenceRank1: meta.evidenceRank1,
          visualReviewStatus: meta.visualReviewStatus,
          visualReviewBestScore: meta.visualReviewBestScore,
          visualReviewBestPhrase: meta.visualReviewBestPhrase,
          visualReviewEvidenceCount: meta.visualReviewEvidenceCount,
          objectFrame: meta.frame,
          objectBbox: meta.bbox,
          source: "ply+objects_jsonl"
        };
      });
    }

    function parseAsciiPly(text) {
      const lines = text.split(/\r?\n/);
      if (lines[0]?.trim() !== "ply") throw new Error("Not a PLY file.");
      let vertexCount = 0;
      const properties = [];
      let inVertex = false;
      let headerEnd = -1;
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line === "end_header") { headerEnd = i; break; }
        const parts = line.split(/\s+/);
        if (parts[0] === "format" && parts[1] !== "ascii") throw new Error("Only ASCII PLY is supported.");
        if (parts[0] === "element") {
          inVertex = parts[1] === "vertex";
          if (inVertex) vertexCount = Number(parts[2]);
        } else if (inVertex && parts[0] === "property") {
          properties.push(parts.at(-1));
        }
      }
      if (headerEnd < 0) throw new Error("PLY header has no end_header.");
      const rows = [];
      const dataLines = lines.slice(headerEnd + 1, headerEnd + 1 + vertexCount);
      for (const line of dataLines) {
        if (!line.trim()) continue;
        const values = line.trim().split(/\s+/);
        const row = {};
        for (let i = 0; i < properties.length; i++) row[properties[i]] = values[i];
        const semantic = row.semantic ?? row.label ?? row.class ?? row.semantic_label;
        rows.push({
          x: Number(row.x), y: Number(row.y), z: Number(row.z),
          rgb: [Number(row.red ?? 220), Number(row.green ?? 220), Number(row.blue ?? 220)],
          objectId: row.object ?? row.object_id ?? row.obj ?? "",
          semanticId: semantic,
          label: labelFromSemantic(semantic),
          frame: row.frame ?? "",
          status: row.status ?? "",
          source: "ply"
        });
      }
      return rows.filter(r => Number.isFinite(r.x) && Number.isFinite(r.y) && Number.isFinite(r.z));
    }

    function parseObjectJsonl(text) {
      const rows = [];
      for (const line of text.split(/\r?\n/)) {
        if (!line.trim()) continue;
        const obj = JSON.parse(line);
        const c = obj.centroid || [0, 0, 0];
        const label = obj.semantic_label || obj.dominant_label || "unknown";
        rows.push({
          x: Number(c[0]), y: Number(c[1]), z: Number(c[2]),
          rgb: obj.mean_color || LABEL_COLORS[label] || LABEL_COLORS.unknown,
          objectId: obj.object_id,
          semanticId: LABEL_IDS[label] ?? "",
          label,
          frame: Array.isArray(obj.frames) ? `${obj.frames[0]}-${obj.frames.at(-1)}` : "",
          status: obj.status || "",
          pointCount: obj.point_count,
          targetCount: obj.target_count,
          dominantLabelRatio: obj.dominant_label_ratio,
          labelVotes: obj.label_votes || {},
          description: obj.description || "",
          displayIdentity: obj.display_identity || obj.identity_hint || "",
          refineReason: obj.refine_reason || "",
          semanticLabelOriginal: obj.semantic_label_original || "",
          parentObjectId: obj.parent_object_id || "",
          reviewLabel: obj.review_label || "",
          reviewStatus: obj.review_status || "",
          reviewReasons: obj.review_reasons || [],
          candidateLabel: obj.candidate_label || "",
          geometryClass: obj.geometry_class || "",
          imageEvidenceCount: obj.image_evidence_count,
          bestEvidence: obj.best_evidence || {},
          geometryStats: obj.geometry_stats || {},
          descriptionVoteRatio: obj.description_vote_ratio,
          descriptionVotes: obj.description_votes || {},
          identityHint: obj.identity_hint || "",
          attributes: obj.dominant_attributes || obj.attributes || {},
          sceneContext: obj.scene_context || "",
          sceneDescription: obj.scene_description || "",
          heightLayer: obj.height_layer || {},
          geometryQuality: obj.geometry_quality || "",
          geometryFlags: obj.geometry_flags || [],
          downstreamStage: obj.downstream_stage || "",
          reviewPriority: obj.review_priority || "",
          dinoPromptGroup: obj.dino_prompt_group || "",
          dinoPrompts: obj.dino_prompts || [],
          priorityGuardStatus: obj.priority_guard_status || "",
          priorityGuardReasons: obj.priority_guard_reasons || [],
          evidenceRank1: obj.evidence_rank1 || {},
          visualReviewStatus: obj.visual_review_status || "",
          visualReviewBestScore: obj.visual_review_best_score,
          visualReviewBestPhrase: obj.visual_review_best_phrase || "",
          visualReviewEvidenceCount: obj.visual_review_evidence_count,
          bbox: obj.bbox_3d,
          source: "objects_jsonl"
        });
      }
      return rows;
    }

    function parseFile(file, text) {
      const name = file.name.toLowerCase();
      if (name.endsWith(".ply")) return parseAsciiPly(text);
      if (name.endsWith(".jsonl") || name.endsWith(".json") || name.endsWith(".txt")) return parseObjectJsonl(text);
      throw new Error("Unsupported file extension. Use .ply or .jsonl.");
    }

    async function parseFiles(files) {
      const parsed = [];
      for (const file of files) {
        const rows = parseFile(file, await file.text());
        parsed.push({ name: file.name, rows });
      }
      const pointRows = parsed.flatMap(item => item.rows.filter(row => row.source === "ply"));
      const objectRows = parsed.flatMap(item => item.rows.filter(row => row.source === "objects_jsonl"));
      const rows = pointRows.length ? enrichPointRows(pointRows, objectRows) : objectRows;
      return { rows, names: parsed.map(item => item.name) };
    }

    function computeBounds(rows) {
      const min = new THREE.Vector3(Infinity, Infinity, Infinity);
      const max = new THREE.Vector3(-Infinity, -Infinity, -Infinity);
      for (const r of rows) {
        min.min(new THREE.Vector3(r.x, r.y, r.z));
        max.max(new THREE.Vector3(r.x, r.y, r.z));
      }
      return { min, max, center: min.clone().add(max).multiplyScalar(0.5), size: max.clone().sub(min) };
    }

    function rebuildGeometry() {
      if (pointsObject) {
        scene.remove(pointsObject);
        pointsObject.geometry.dispose();
        pointsObject.material.dispose();
      }
      const stride = Math.max(1, Number(els.sampleStride.value) || 1);
      const maxVisiblePoints = Math.max(0, Number(els.maxVisiblePoints.value) || 0);
      const labelFilter = els.labelFilter.value;
      const objectFilter = els.objectFilter.value.trim();
      const objectFilterKeys = objectFilter ? new Set(objectKeys(objectFilter)) : null;
      const candidateIndices = [];
      for (let i = 0; i < rawRows.length; i += stride) {
        const row = rawRows[i];
        if (labelFilter && row.label !== labelFilter) continue;
        if (objectFilterKeys && !objectKeys(row.objectId).some(key => objectFilterKeys.has(key))) continue;
        candidateIndices.push(i);
      }
      lastCandidateCount = candidateIndices.length;
      lastPointBudgetStride = maxVisiblePoints > 0
        ? Math.max(1, Math.ceil(candidateIndices.length / maxVisiblePoints))
        : 1;
      filteredIndices = [];
      for (let i = 0; i < candidateIndices.length; i += lastPointBudgetStride) {
        filteredIndices.push(candidateIndices[i]);
      }
      const positions = new Float32Array(filteredIndices.length * 3);
      const colors = new Float32Array(filteredIndices.length * 3);
      const mode = els.colorMode.value;
      for (let i = 0; i < filteredIndices.length; i++) {
        const row = rawRows[filteredIndices[i]];
        positions[i * 3] = row.x;
        positions[i * 3 + 1] = row.y;
        positions[i * 3 + 2] = row.z;
        const color = colorForRow(row, mode);
        colors[i * 3] = color[0] / 255;
        colors[i * 3 + 1] = color[1] / 255;
        colors[i * 3 + 2] = color[2] / 255;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      const material = new THREE.PointsMaterial({
        size: Number(els.pointSize.value),
        sizeAttenuation: false,
        vertexColors: true
      });
      pointsObject = new THREE.Points(geometry, material);
      scene.add(pointsObject);
      renderStats();
      renderLegend();
    }

    function fitView() {
      if (!bounds) return;
      const radius = Math.max(bounds.size.x, bounds.size.y, bounds.size.z, 1);
      controls.target.copy(bounds.center);
      camera.position.set(bounds.center.x + radius * 0.8, bounds.center.y - radius * 1.2, bounds.center.z + radius * 0.8);
      camera.near = Math.max(radius / 10000, 0.01);
      camera.far = radius * 100;
      camera.updateProjectionMatrix();
      controls.update();
    }

    function renderStats() {
      const labels = new Map();
      const statuses = new Map();
      for (const r of rawRows) {
        labels.set(r.label, (labels.get(r.label) || 0) + 1);
        if (r.status) statuses.set(r.status, (statuses.get(r.status) || 0) + 1);
      }
      els.stats.innerHTML = [
        kv("加载行数", rawRows.length.toLocaleString()),
        kv("可见行数", filteredIndices.length.toLocaleString()),
        kv("候选行数", lastCandidateCount.toLocaleString()),
        kv("限点采样", lastPointBudgetStride > 1 ? `每 ${lastPointBudgetStride} 点取 1 点` : "未触发"),
        kv("标签数", labels.size),
        kv("Object 筛选", els.objectFilter.value.trim() || "全部"),
        kv("边界尺寸", bounds ? `${bounds.size.x.toFixed(2)}, ${bounds.size.y.toFixed(2)}, ${bounds.size.z.toFixed(2)}` : "")
      ].join("") + "<h2>标签计数</h2>" + [...labels.entries()]
        .sort((a, b) => b[1] - a[1])
        .map(([label, count]) => `<span class="pill">${escapeHtml(displayLabel(label))} ${count.toLocaleString()}</span>`)
        .join("") + (statuses.size ? "<h2>状态计数</h2>" + [...statuses.entries()]
          .sort((a, b) => b[1] - a[1])
          .map(([status, count]) => `<span class="pill">${escapeHtml(displayStatus(status))} ${count.toLocaleString()}</span>`)
          .join("") : "");
    }

    function renderLegend() {
      const mode = els.colorMode.value;
      const values = mode === "status"
        ? [...new Set(rawRows.map(r => r.status).filter(Boolean))].sort()
        : [...new Set(rawRows.map(r => r.label))].sort();
      els.legend.innerHTML = values.map(value => {
        const rgb = mode === "status" ? STATUS_COLORS[value] : colorForRow({ label: value, objectId: value }, mode);
        const text = mode === "status" ? displayStatus(value) : displayLabel(value);
        return `<span class="pill"><span class="swatch" style="background: rgb(${rgb.join(",")})"></span>${escapeHtml(text)}</span>`;
      }).join("");
    }

    function kv(k, v) {
      return `<div class="kv"><span>${escapeHtml(k)}</span><span>${escapeHtml(String(v ?? ""))}</span></div>`;
    }
    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function rejectedArtifactMatch(urls) {
      for (const raw of urls) {
        const text = decodeURIComponent(String(raw || ""));
        const match = REJECTED_ARTIFACT_SUBSTRINGS.find(item => text.includes(item));
        if (match) return match;
      }
      return "";
    }

    function assertUrlArtifactsAllowed(urls) {
      const params = new URLSearchParams(window.location.search);
      if (params.get("allowRejected") === "1") return;
      const match = rejectedArtifactMatch(urls);
      if (!match) return;
      throw new Error(
        `Rejected diagnostic artifact blocked: ${match}. ` +
        "Open /docs/current_dense_review_index.html for approved review links, " +
        "or add allowRejected=1 only when intentionally inspecting a rejected run."
      );
    }

    function updateLabelOptions() {
      const labels = [...new Set(rawRows.map(r => r.label))].sort();
      els.labelFilter.innerHTML = '<option value="">全部标签</option>' + labels.map(l => `<option value="${escapeHtml(l)}">${escapeHtml(displayLabel(l))}</option>`).join("");
    }

    function applyUrlDisplayParams(params) {
      const mode = params.get("mode");
      if (mode && [...els.colorMode.options].some(option => option.value === mode)) els.colorMode.value = mode;
      const pointSize = Number(params.get("pointSize"));
      if (Number.isFinite(pointSize) && pointSize > 0) els.pointSize.value = String(pointSize);
      const stride = Number(params.get("stride"));
      if (Number.isFinite(stride) && stride >= 1) els.sampleStride.value = String(Math.floor(stride));
      const maxPoints = Number(params.get("maxPoints"));
      if (Number.isFinite(maxPoints) && maxPoints >= 0) {
        const options = [...els.maxVisiblePoints.options].map(option => Number(option.value));
        const nearest = options.reduce((best, value) => Math.abs(value - maxPoints) < Math.abs(best - maxPoints) ? value : best, options[0]);
        els.maxVisiblePoints.value = String(nearest);
      }
    }

    function applyUrlLabelParam(params) {
      const label = params.get("label");
      if (!label) return;
      const option = [...els.labelFilter.options].find(item => item.value === label);
      if (option) els.labelFilter.value = label;
    }

    function applyUrlObjectParam(params) {
      const object = params.get("object");
      if (object) els.objectFilter.value = object;
    }

    async function loadFiles(files) {
      const list = [...files];
      els.stats.textContent = `正在加载 ${list.map(file => file.name).join(", ")} ...`;
      const loaded = await parseFiles(list);
      rawRows = loaded.rows;
      if (!rawRows.length) throw new Error("No points/objects parsed.");
      bounds = computeBounds(rawRows);
      updateLabelOptions();
      const params = new URLSearchParams(window.location.search);
      applyUrlLabelParam(params);
      applyUrlObjectParam(params);
      rebuildGeometry();
      fitView();
      els.details.innerHTML = kv("文件", loaded.names.join(", ")) + kv("类型", rawRows[0].source);
    }

    async function fetchUrlRows(url) {
      const displayName = decodeURIComponent(url.split("/").pop() || "remote.ply");
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Failed to load ${url}: HTTP ${response.status}`);
      const text = await response.text();
      return { name: displayName, rows: parseFile({ name: displayName }, text), url };
    }

    async function loadUrl(url) {
      assertUrlArtifactsAllowed([url]);
      els.stats.textContent = `正在加载 ${decodeURIComponent(url.split("/").pop() || "remote.ply")} ...`;
      const loaded = await fetchUrlRows(url);
      rawRows = loaded.rows;
      if (!rawRows.length) throw new Error("No points/objects parsed.");
      bounds = computeBounds(rawRows);
      updateLabelOptions();
      const params = new URLSearchParams(window.location.search);
      applyUrlLabelParam(params);
      applyUrlObjectParam(params);
      rebuildGeometry();
      fitView();
      els.details.innerHTML = kv("文件", loaded.name) + kv("URL", url) + kv("类型", rawRows[0].source);
    }

    async function loadUrls(urls) {
      assertUrlArtifactsAllowed(urls);
      els.stats.textContent = `正在加载 ${urls.length} 个文件 ...`;
      const parsed = [];
      for (const url of urls) parsed.push(await fetchUrlRows(url));
      const pointRows = parsed.flatMap(item => item.rows.filter(row => row.source === "ply"));
      const objectRows = parsed.flatMap(item => item.rows.filter(row => row.source === "objects_jsonl"));
      rawRows = pointRows.length ? enrichPointRows(pointRows, objectRows) : objectRows;
      if (!rawRows.length) throw new Error("No points/objects parsed.");
      bounds = computeBounds(rawRows);
      updateLabelOptions();
      const params = new URLSearchParams(window.location.search);
      applyUrlLabelParam(params);
      applyUrlObjectParam(params);
      rebuildGeometry();
      fitView();
      els.details.innerHTML = [
        kv("文件", parsed.map(item => item.name).join(", ")),
        kv("URL", urls.join(", ")),
        kv("类型", rawRows[0].source)
      ].join("");
    }

    const raycaster = new THREE.Raycaster();
    raycaster.params.Points.threshold = 0.12;
    const pointer = new THREE.Vector2();
    renderer.domElement.addEventListener("click", event => {
      if (!pointsObject) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObject(pointsObject, false)[0];
      if (!hit) return;
      const row = rawRows[filteredIndices[hit.index]];
      els.details.innerHTML = [
        kv("Object", row.objectId),
        kv("父 Object", row.parentObjectId || ""),
        kv("标签", displayLabel(row.label)),
        kv("机器标签", row.label),
        kv("语义 ID", row.semanticId),
        kv("状态", displayStatus(row.status)),
        kv("原始状态", row.status),
        kv("Review 标签", row.reviewLabel || ""),
        kv("Review 状态", row.reviewStatus || ""),
        kv("Review 原因", row.reviewReasons && row.reviewReasons.length ? row.reviewReasons.join(", ") : ""),
        kv("候选标签", row.candidateLabel || ""),
        kv("局部几何类", row.geometryClass || ""),
        kv("帧", row.frame),
        kv("Object 帧", row.objectFrame || ""),
        kv("点数", row.pointCount ?? ""),
        kv("Targets", row.targetCount ?? ""),
        kv("主标签占比", row.dominantLabelRatio != null ? Number(row.dominantLabelRatio).toFixed(3) : ""),
        kv("身份", row.displayIdentity || row.identityHint || ""),
        kv("描述", row.description || ""),
        kv("场景", displaySceneContext(row.sceneContext)),
        kv("原始场景", row.sceneContext || ""),
        kv("场景描述", row.sceneDescription || ""),
        kv("高度层", row.heightLayer && Object.keys(row.heightLayer).length ? JSON.stringify(row.heightLayer) : ""),
        kv("下游阶段", displayDownstream(row.downstreamStage)),
        kv("复审优先级", displayReviewPriority(row.reviewPriority)),
        kv("几何质量", displayGeometryQuality(row.geometryQuality)),
        kv("几何标记", row.geometryFlags && row.geometryFlags.length ? row.geometryFlags.join(", ") : ""),
        kv("DINO 组", displayPromptGroup(row.dinoPromptGroup)),
        kv("DINO prompts", row.dinoPrompts && row.dinoPrompts.length ? row.dinoPrompts.join(", ") : ""),
        kv("Priority guard", displayPriorityGuard(row.priorityGuardStatus)),
        kv("Guard 原因", row.priorityGuardReasons && row.priorityGuardReasons.length ? row.priorityGuardReasons.join(", ") : ""),
        kv("图像证据", row.evidenceRank1 && Object.keys(row.evidenceRank1).length ? JSON.stringify(row.evidenceRank1) : ""),
        kv("最佳图像证据", row.bestEvidence && Object.keys(row.bestEvidence).length ? JSON.stringify(row.bestEvidence) : ""),
        kv("图像证据数", row.imageEvidenceCount ?? ""),
        kv("视觉复审", displayVisualReview(row.visualReviewStatus)),
        kv("视觉分数", row.visualReviewBestScore != null ? Number(row.visualReviewBestScore).toFixed(3) : ""),
        kv("视觉短语", row.visualReviewBestPhrase || ""),
        kv("视觉证据数", row.visualReviewEvidenceCount ?? ""),
        kv("原始标签字段", row.semanticLabelOriginal || ""),
        kv("修正原因", row.refineReason || ""),
        kv("描述占比", row.descriptionVoteRatio != null ? Number(row.descriptionVoteRatio).toFixed(3) : ""),
        kv("身份提示", row.identityHint || ""),
        kv("属性", row.attributes && Object.keys(row.attributes).length ? JSON.stringify(row.attributes) : ""),
        kv("几何", row.geometryStats && Object.keys(row.geometryStats).length ? JSON.stringify(row.geometryStats) : ""),
        kv("xyz", `${row.x.toFixed(3)}, ${row.y.toFixed(3)}, ${row.z.toFixed(3)}`),
        kv("标签投票", displayLabelVotes(row.labelVotes)),
        kv("描述投票", displayDescriptionVotes(row.descriptionVotes))
      ].join("");
    });

    function resize() {
      const rect = viewport.getBoundingClientRect();
      renderer.setSize(rect.width, rect.height);
      camera.aspect = rect.width / Math.max(rect.height, 1);
      camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", resize);
    resize();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    els.file.addEventListener("change", async () => {
      if (!els.file.files.length) return;
      try { await loadFiles(els.file.files); } catch (err) { els.stats.innerHTML = `<span class="warn">${escapeHtml(err.message)}</span>`; }
    });
    for (const eventName of ["dragenter", "dragover"]) {
      els.drop.addEventListener(eventName, event => {
        event.preventDefault();
        els.drop.classList.add("drag");
      });
    }
    for (const eventName of ["dragleave", "drop"]) {
      els.drop.addEventListener(eventName, event => {
        event.preventDefault();
        els.drop.classList.remove("drag");
      });
    }
    els.drop.addEventListener("drop", async event => {
      if (!event.dataTransfer.files.length) return;
      try { await loadFiles(event.dataTransfer.files); } catch (err) { els.stats.innerHTML = `<span class="warn">${escapeHtml(err.message)}</span>`; }
    });
    for (const el of [els.colorMode, els.pointSize, els.sampleStride, els.maxVisiblePoints, els.labelFilter, els.objectFilter]) {
      el.addEventListener("input", () => rawRows.length && rebuildGeometry());
    }
    els.fit.addEventListener("click", fitView);
    els.resetFilter.addEventListener("click", () => {
      els.labelFilter.value = "";
      els.objectFilter.value = "";
      if (rawRows.length) rebuildGeometry();
    });

    const params = new URLSearchParams(window.location.search);
    applyUrlDisplayParams(params);
    const urlParams = [params.get("file"), params.get("objects")].filter(Boolean);
    if (urlParams.length) {
      loadUrls(urlParams).catch(err => {
        els.stats.innerHTML = `<span class="warn">${escapeHtml(err.message)}</span>`;
      });
    }
  </script>
</body>
</html>
