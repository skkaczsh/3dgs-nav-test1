debts:
  - id: debt-data-redundancy
    title: 数据冗余（data.zip + __MACOSX）
    severity: medium
    status: open
    cause: 原始数据解压后未清理压缩包和 macOS 残留
    impact: 浪费 ~6.6 GB 磁盘空间
    repayment_plan: 验证 extracted/ 完整性后删除 data.zip 和 __MACOSX/
    linked_nodes:
      - data-raw
      - task-cleanup

  - id: debt-no-knowledge-structure
    title: 项目知识管理缺失
    severity: medium
    status: active
    cause: 项目刚启动，无文档、无 Git、无脚本
    impact: 知识无沉淀，进度不可追踪，无法回滚
    repayment_plan: 正在创建 roadmap.html / knowledge.yaml / assets-debt.yaml；后续需初始化 Git
    linked_nodes:
      - task-init-knowledge
      - task-init-git

  - id: debt-no-git
    title: 无 Git 版本控制
    severity: medium
    status: open
    cause: 未初始化 Git 仓库
    impact: 代码修改不可追踪，无协作基础
    repayment_plan: 初始化 Git 仓库，配置 .gitignore 排除大文件（视频、点云、压缩包）
    linked_nodes:
      - risk-no-git
      - task-init-git

  - id: debt-video-metadata-unknown
    title: 视频时长/帧率/编码未知
    severity: low
    status: open
    cause: 未执行 ffprobe 检查视频元数据
    impact: 无法确定帧提取 stride 和最终训练帧数
    repayment_plan: 运行 ffprobe 检查 3 路 MKV 元数据
    linked_nodes:
      - risk-video-duration
      - task-extract-frames

  - id: debt-calib-frame-correspondence
    title: 标定帧数对应关系未验证
    severity: medium
    status: open
    cause: calib_online.yaml 帧数未确认与 img_pos.txt 7,631 行的精确对应关系
    impact: 若帧数不对应，transforms.json 构建可能出错
    repayment_plan: 解析 calib_online.yaml 帧数并与 img_pos.txt 时间戳对齐验证
    linked_nodes:
      - risk-calib-consistency
      - task-validate-data

  - id: debt-device-id-mismatch
    title: 设备标识不一致
    severity: low
    status: open
    cause: calib_online_final.yaml 标识 "Pocket2"，cam_in_ex.txt 标识 "Pocket2-Q9000"
    impact: 需确认是同一设备的不同标识还是不同设备
    repayment_plan: 查阅 MANIFOLD 文档或对比标定参数验证
    linked_nodes:
      - risk-calib-consistency

  - id: debt-old-pipeline-adaptation
    title: 旧管线适配待完成
    severity: high
    status: open
    cause: 新路线数据量 18 倍增长（7631 vs 411 sections），旧管线需适配
    impact: 内存、计算时间、存储需求显著增加
    repayment_plan: 评估分块/流式处理方案，适配帧数参数
    linked_nodes:
