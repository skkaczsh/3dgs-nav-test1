debts:
  - id: debt-semantic-order-wrong
    title: 语义驱动边界的路线已证明上限低
    severity: high
    status: accepted
    cause: SAM/DINO/VLM mask label 先决定 object，再投回点云，会把墙/地/车/栏杆错误吞并；不同传感器的不确定性被当作硬边界使用
    impact: 每个版本都有不同的大面积混杂，且调参无法稳定提升上限
    repayment_plan: 当前主线改为 geometry-first：先锁定 exclusive voxel patch/object ownership，再把 skymask、first-touch、mask、VLM、scene prior 作为 evidence

  - id: debt-patch-fragmentation
    title: Patch/Object 仍偏碎
    severity: high
    status: open
    cause: 当前 energy_attach_v4 + SPG v4 保守保护结构边界；提高召回的 v7 uncertain-fragment bridge 已出现地面/墙/草地过合并
    impact: 车、窗、建筑立面、树木等目标可能被拆成多个 patch/object，语义聚合缺少稳定对象容器
    repayment_plan: 继续在 dense Opt-LAS / 0.03m voxel 上优化 SPG edge evidence；gate 必须同时看 exclusive ownership、fine overlap、fragmentation、过合并风险和 visual QA

  - id: debt-sensor-trust-contract
    title: 传感器证据职责边界需继续固化
    severity: high
    status: open
    cause: drivability_cpp、first-touch depth、skymask、VLM、MASK 各自有不同误差模型；历史上多次把 evidence 当 truth
    impact: 结构先验会被语义污染，VLM/MASK 会跨越几何边界，导致地面/墙面/细目标互相覆盖
    repayment_plan: 在代码合同中强制：几何 ownership 只能由点云结构产生；VLM/MASK 只能写 posterior/evidence；viewer artifact QA-only

  - id: debt-no-transforms
    title: transforms.json 未构建
    severity: low
    status: open
    cause: 旧 3DGS processed/outputs 已清理，需从正确 scanner-native 投影链重建 Nerfstudio 输入
    impact: 影响 3DGS 研究备线，不影响当前停车场 dense Patch/Object 主线
    repayment_plan: 从 img_pos + Tcl + Til + frame_id 构建，并用 MID360 扫描线/CloudCompare QA 验证

  - id: debt-cam1-sky
    title: cam1 天空检测不适用
    severity: low
    status: open
    cause: cam1 朝上相机，skyseg 模型不识别室内天花板
    impact: cam1 帧天空未过滤，但着色时已通过深度融合缓解
    repayment_plan: 可对 cam1 使用不同策略或跳过 sky mask

  - id: debt-cam2-skymask-gap
    title: cam2 skymask 连续缺口
    severity: medium
    status: historical
    cause: 0-500 样本中 cam2 在 365-500 存在连续 skymask 缺失；sky_masks_refined 不覆盖 cam2，不能替代 sky_masks_color
    impact: 属于 202605/早期投影路线历史债；停车场当前以 first-touch/skymask visibility 作 evidence，需按新数据集重新审计
    repayment_plan: 补跑 cam2 365-500 的 skyseg/颜色扩展；完成后重新生成 skymask_missing 和 QA summary

  - id: debt-old-transform-route
    title: 旧 transforms/3DGS 投影链路不可信
    severity: high
    status: accepted
    cause: 旧链路混用 transforms.json、3DGS/COLMAP 坐标和推断帧映射；MID360 扫描线结构曾异常
    impact: 高覆盖率可能是假覆盖，颜色/语义会错投到地面、天空或背景
    repayment_plan: 已废弃其 correctness 结论；直接点云语义生产必须以 new_route/scripts 的原生 img_pos/cam_in_ex/Tcl/Til/frame_id 闭环为主

  - id: debt-data-redundancy
    title: 旧实验产物冗余
    severity: low
    status: mitigated
    cause: 旧 debug、deprecated semantic PLY、tmp smoke、旧 3DGS processed/outputs 占用空间
    impact: 已清理；MT20260511-165822 当前约 3.3G，manifold_3dgs_project 当前约 6.7M
    repayment_plan: 后续按阶段保留 QA 报告，及时删除临时 PLY/PNG/debug 目录

  - id: debt-semantic-coverage
    title: 2D mask-first 语义覆盖率不足
    severity: high
    status: accepted
    cause: 已测 SAM3/skymask/Qwen 组合点级 labeled ratio 仍低；VLM parse 可接受但 2D mask coverage 不足
    impact: 不再适合作为主边界生成路线，只能作为 patch/object 的视觉 evidence
    repayment_plan: 不再追求 SAM 全图 mask 直接产出最终 object；转为 dense patch/object 后的多视角 evidence fusion
