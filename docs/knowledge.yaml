- id: knowledge-world-coords
  type: module
  title: PLY 点云坐标系发现
  status: active
  summary: PLY section 中的点云为世界坐标系（非本地 LiDAR 坐标系）。证据：减去 IMU 位置后质心约 (2,0,0)。着色变换链：P_cam
    = inv(Tcl) @ inv(T_world_lidar) @ P_world，T_world_lidar = T_world_body @ Til。
  links:
  - pc-extracted
  - task-colorization
- id: knowledge-lidar-video-mapping
  type: module
  title: LiDAR 帧→视频帧映射
  status: active
  summary: 视频7631帧@10fps=763秒，LiDAR 7631帧覆盖951秒（间隔不均匀）。必须通过时间戳映射：video_frame = round((lidar_timestamp
    - t0) * fps)。仅前~6072个LiDAR帧有对应视频帧。
  links:
  - data-raw
  - task-colorization
- id: task-colorization
  type: task
  title: 点云着色
  status: done
  summary: colorize_v3.py 已实现。Convention B (Tcl=LiDAR→Cam) + OpenCV fisheye投影。着色率100%，远景效果尚可，但受天空干扰。
  links:
  - knowledge-world-coords
  - knowledge-tf-tree
  - task-skymask
- id: task-skymask
  type: task
  title: 天空 Mask
  status: blocked
  summary: 引入 skymask 模型对图像做天空分割，避免天空颜色干扰点云着色。需准备服务器和模型信息。
  links:
  - pipeline-semantic
  - task-colorization
- id: knowledge-convention-b
  type: module
  title: Convention B 验证
  status: active
  summary: Tcl 矩阵含义为 LiDAR→Camera（P_cam = Tcl @ P_lidar）。验证方法：LiDAR环在图像中应水平（平行宽度方向）。使用 calib_online_final.yaml 的 Tcl。
  links:
  - calib-final
  - task-validate-pose
  - task-colorization
