nodes:
  - id: project-root
    type: module
    title: New Route 项目
    status: active
    summary: MANIFOLD Pocket2-Q9000 大范围路线扫描数据 · 3DGS 重建项目
    links:
      - data-raw
      - data-calib
      - data-pointcloud
      - pipeline-preprocess
      - risk-overview

  # ── 数据层 ──
  - id: data-raw
    type: module
    title: 原始采集数据
    status: active
    summary: 3路鱼眼视频 + IMU + 位姿 + 在线标定，总 ~11GB
    links:
      - data-calib
      - data-pointcloud
      - debt-data-redundancy
      - risk-imgpos-interpretation

  - id: data-calib
    type: module
    title: 标定体系
    status: active
    summary: 三层标定数据（final/online/cam_in_ex），定义坐标系变换树
    links:
      - calib-final
      - calib-online
      - calib-caminex

  - id: calib-final
    type: data
    title: calib_online_final.yaml
    status: done
    summary: 设备级最终标定：Tcl_0/1/2 + Til，4×4 矩阵，设备 Pocket2
    links:
      - data-calib
      - calib-online
      - calib-caminex

  - id: calib-online
    type: data
    title: calib_online.yaml
    status: active
    summary: 逐帧在线标定（~19万行），每帧含 Tcl_0 + body_T_lidar（世界坐标权威来源）
    links:
      - data-raw
      - risk-imgpos-interpretation
      - task-pipeline-build

  - id: calib-caminex
    type: data
    title: cam_in_ex.txt
    status: done
    summary: 3个鱼眼相机 Kannala 畸变模型内参 + 外参，设备 Pocket2-Q9000
    links:
      - data-calib
      - task-undistort

  - id: data-pointcloud
    type: module
    title: 点云数据
    status: active
    summary: 7,631个 PLY section + LAS 格式 3DGS 输出点云
    links:
      - pc-extracted
      - pc-las
      - task-export-pointcloud
      - risk-data-scale

  - id: pc-extracted
    type: data
    title: extracted/ 目录
    status: done
    summary: 7,631 个 ASCII PLY（仅 xyz），点数 5,945~177,318/section，总计 ~3.1GB
    links:
      - data-pointcloud
      - risk-data-scale

  - id: pc-las
    type: data
    title: 3DGS 输出点云 (.las)
    status: done
    summary: Point Format 2（含 RGB），1.09 亿点，MANIFOLD 平台 3DGS 重建结果
    links:
      - data-pointcloud

  # ── 管线层 ──
  - id: pipeline-preprocess
    type: module
    title: 预处理管线
    status: pending
    summary: 原始数据 → Nerfstudio transforms.json + 图像 + 点云，待建
    links:
      - task-extract-frames
      - task-parse-calibration
      - task-undistort
      - task-build-transforms
      - task-export-pointcloud
      - task-validate-pose
      - pipeline-3dgs

  - id: pipeline-3dgs
    type: module
    title: 3DGS 训练管线
    status: pending
    summary: Nerfstudio Splatfacto 训练，待建
    links:
      - pipeline-preprocess
      - risk-data-scale

  - id: pipeline-semantic
    type: module
    title: 语义分割管线
    status: pending
    summary: SAM2 + VLM 语义标注，待建
    links:
      - pipeline-3dgs

  # ── 知识层 ──
  - id: knowledge-tf-tree
    type: module
    title: 坐标系变换树
    status: active
    summary: World→Body→LiDAR→Cam/IMU 变换链，body_T_lidar 是世界坐标唯一来源
    links:
      - calib-online
      - calib-final

  - id: knowledge-imgpos-format
    type: module
    title: img_pos.txt 列含义
    status: active
    summary: 7,631行×19列；列3-5 是 IMU 位置（非世界坐标）；列6-9 是四元数；列1 帧号；列2 时间戳
    links:
      - risk-imgpos-interpretation
      - calib-online

  - id: knowledge-lx-format
    type: module
    title: .lx Section 格式
    status: active
    summary: Header 48B + Point Count 4B + Points N×16B（3×float32 xyz + uint32 marker）
    links:
      - pc-extracted
      - risk-data-scale

  # ── 任务 ──
  - id: task-init-git
    type: task
    title: Git 仓库初始化
    status: pending
    summary: 初始化 Git 仓库，配置 .gitignore 排除大文件
    links:
      - risk-no-git

  - id: task-init-knowledge
    type: task
    title: 知识管理文档初始化
    status: active
    summary: 创建 roadmap.html / knowledge.yaml / assets-debt.yaml
    links:
      - debt-no-knowledge-structure

  - id: task-validate-data
    type: task
    title: 数据完整性验证
    status: pending
    summary: 确认视频时长、帧数对应、设备标识、PLY section 数量 vs img_pos 行数
    links:
      - risk-video-duration
      - risk-calib-consistency

  - id: task-cleanup
    type: task
    title: 冗余数据清理
    status: pending
    summary: 验证 extracted/ 完整性后删除 data.zip + __MACOSX/，释放 ~6.6GB
    links:
      - debt-data-redundancy

  - id: task-extract-frames
    type: task
    title: 01 视频帧提取
    status: pending
    summary: 从 3 路 MKV 提取帧图像，确定 stride
    links:
      - data-raw
      - risk-video-duration

  - id: task-parse-calibration
    type: task
    title: 02 标定解析
    status: pending
    summary: 解析 cam_in_ex.txt → calibration.json
    links:
      - calib-caminex

  - id: task-undistort
    type: task
    title: 03 鱼眼去畸变
    status: pending
    summary: Kannala 模型去畸变，畸变系数较小需评估必要性
    links:
      - decision-undistort-necessity

  - id: task-build-transforms
    type: task
    title: 04 构建 transforms.json
    status: pending
    summary: 从 calib_online.yaml 构建 Nerfstudio 格式相机位姿，严禁用 img_pos 列3-5
    links:
      - knowledge-tf-tree
      - risk-imgpos-interpretation

  - id: task-validate-pose
    type: task
    title: 05 位姿验证
    status: pending
    summary: 生成相机视锥体 + 轨迹 PLY 可视化
    links:
      - task-build-transforms

  - id: task-export-pointcloud
    type: task
    title: 06 导出全局点云
    status: pending
    summary: 合并 7,631 section → 全局坐标系下采样点云，需分块处理
    links:
      - pc-extracted
      - risk-data-scale

  - id: task-pipeline-build
    type: task
    title: 预处理管线建设
    status: pending
    summary: 建立 01~07 预处理脚本适配 new_route 数据
    links:
      - pipeline-preprocess
      - decision-pipeline-reuse

  # ── 风险 ──
  - id: risk-overview
    type: risk
    title: 风险总览
    status: open
    summary: 包含 5 项主要风险
    links:
      - risk-imgpos-interpretation
      - risk-data-scale
      - risk-video-duration
      - risk-calib-consistency
      - risk-no-git

  - id: risk-imgpos-interpretation
    type: risk
    title: img_pos.txt 列含义误用
    status: open
    summary: 列3-5 是 IMU 位置非世界坐标，误用将导致训练完全错误（旧项目已踩坑）
    links:
      - knowledge-imgpos-format
      - task-build-transforms

  - id: risk-data-scale
    type: risk
    title: 数据规模风险
    status: open
    summary: 7,631 section（旧路线18倍），内存/计算/时间需评估
    links:
      - pc-extracted
      - task-export-pointcloud

  - id: risk-video-duration
    type: risk
    title: 视频时长与帧率待确认
    status: pending
    summary: 3路 MKV 视频具体时长/帧率/编码未确认
    links:
      - task-extract-frames

  - id: risk-calib-consistency
    type: risk
    title: 标定数据一致性待验证
    status: pending
    summary: calib_online 帧数 vs img_pos 行数对应关系、设备标识差异待确认
    links:
      - calib-online
      - calib-final

  - id: risk-no-git
    type: risk
    title: 无 Git 版本控制
    status: open
    summary: SCAN 目录无 Git 仓库，代码修改无法追踪
    links:
      - task-init-git

  # ── 决策 ──
  - id: decision-undistort-necessity
    type: decision
    title: 去畸变必要性决策
    status: pending
    summary: 畸变系数 k2~-0.006 较小，需在新路线图像上评估是否跳过
    links:
      - task-undistort

  - id: decision-pipeline-reuse
    type: decision
    title: 管线复用 vs 重写决策
    status: pending
    summary: 旧管线脚本可复用但需适配帧数/路径；建议先复用再重构
    links:
      - asset-old-pipeline
      - pipeline-preprocess

  # ── 资产 ──
  - id: asset-old-pipeline
    type: asset
    title: 旧路线完整管线经验
    status: active
    summary: 7阶段预处理脚本 + V22基线经验 + SAM/VLM管线 + 语义点云 + img_pos验证结论
    links:
      - decision-pipeline-reuse

  - id: asset-las-output
    type: asset
    title: 3DGS 已输出点云
    status: active
    summary: MANIFOLD 平台 LAS 格式输出（1.09亿点），可作为质量参考基线
    links:
      - pc-las

  # ── 债务 ──
  - id: debt-data-redundancy
    type: debt
    title: 数据冗余
    severity: medium
    status: open
    summary: data.zip 与 extracted/ 重复，加 __MACOSX 残留，浪费 ~6.6GB
    cause: 原始数据解压后未清理压缩包
    impact: 占用磁盘空间
    repayment_plan: 验证 extracted/ 完整性后删除 data.zip 和 __MACOSX/
    linked_nodes:
      - data-raw
      - task-cleanup

  - id: debt-no-knowledge-structure
    type: debt
    title: 项目知识管理缺失
    severity: medium
    status: active
    summary: 缺少 roadmap/knowledge/assets-debt 文档、无 Git、无脚本代码
    cause: 项目刚启动
    impact: 知识无沉淀、进度不可追踪
    repayment_plan: 本次正在创建知识管理文档
    linked_nodes:
      - task-init-knowledge