nodes:
# ═══════════ ROOT ═══════════
- id: project-root
  type: module
  title: New Route 项目
  status: active
  summary: MANIFOLD Pocket2-Q9000 大范围路线扫描 · 全量着色完成 · 41.9M 点 · 599MB
  links:
  - data-raw
  - pipeline-colorize
  - knowledge-convention
  - task-3dgs-train

# ═══════════ DATA ═══════════
- id: data-raw
  type: data
  title: 原始采集数据
  status: done
  summary: 3路鱼眼MKV(7631帧@10fps) + img_pos.txt(7631行) + .lx(1.64GB) + cam_in_ex.txt + calib_online_final.yaml
  links:
  - data-calib
  - data-pointcloud

- id: data-calib
  type: data
  title: 标定体系
  status: done
  summary: calib_online_final.yaml(Tcl+Til) + cam_in_ex.txt(内参+畸变) + img_pos.txt(位姿)
  links:
  - knowledge-convention
  - knowledge-tf-tree

- id: data-pointcloud
  type: data
  title: 点云数据
  status: done
  summary: 7631 PLY sections(世界坐标,~1.1亿点) + colorized_final.ply(41.9M点,599MB)
  links:
  - knowledge-world-coords
  - pipeline-colorize

# ═══════════ PIPELINE ═══════════
- id: pipeline-preprocess
  type: module
  title: 预处理管线
  status: done
  summary: 视频帧提取(22893帧) + 标定解析 + 去畸变 + 位姿验证
  links:
  - pipeline-skymask
  - pipeline-colorize

- id: pipeline-skymask
  type: module
  title: 天空Mask管线
  status: done
  summary: skyseg ONNX模型(168MB) + LAB颜色填充扩充(+1~3%) → 1374张sky mask
  links:
  - pipeline-colorize
  - asset-server

- id: pipeline-colorize
  type: module
  title: 着色管线
  status: done
  summary: Convention B投影 + OpenCV fisheye + sky mask过滤 + 深度融合 → 41.9M点着色
  links:
  - knowledge-convention
  - pipeline-skymask
  - task-3dgs-train

- id: pipeline-3dgs
  type: module
  title: 3DGS训练管线
  status: pending
  summary: Splatfacto训练，待建
  links:
  - pipeline-colorize
  - asset-old-pipeline

# ═══════════ KNOWLEDGE ═══════════
- id: knowledge-convention
  type: module
  title: Convention B (Tcl=LiDAR→Cam)
  status: active
  summary: Tcl矩阵含义为LiDAR→Camera。验证方法：LiDAR环在图像中水平对齐。P_cam = Tcl @ inv(T_world_lidar) @ P_world
  links:
  - data-calib
  - pipeline-colorize

- id: knowledge-world-coords
  type: module
  title: PLY世界坐标系
  status: active
  summary: PLY点云为世界坐标系(非本地LiDAR)。证据：质心跟随设备位置，反变换后质心在原点附近。
  links:
  - data-pointcloud
  - pipeline-colorize

- id: knowledge-tf-tree
  type: module
  title: 坐标系变换树
  status: active
  summary: "World→LiDAR: T_world_lidar=T_world_body@Til; LiDAR→Cam: Tcl(Convention B)"
  links:
  - knowledge-convention
  - data-calib

- id: knowledge-lx-format
  type: module
  title: .lx Section格式
  status: done
  summary: Header 48B(位姿+section编号) + Count 4B + Points N×16B(xyz+marker)
  links:
  - data-raw

# ═══════════ ASSETS ═══════════
- id: asset-server
  type: asset
  title: GPU服务器
  status: active
  summary: "ssh root@10.0.8.114:31079 · L20 46GB · PyTorch 2.10 · transformers 5.9 · 数据: /root/epfs/new_route_data/"
  links:
  - pipeline-colorize
  - pipeline-skymask

- id: asset-old-pipeline
  type: asset
  title: 旧路线完整管线
  status: active
  summary: 服务器/manifold_3dgs_project/有旧路线脚本(00~08) + SAM3 + Qwen VLM
  links:
  - pipeline-3dgs

# ═══════════ TASKS ═══════════
- id: task-transforms
  type: task
  title: 构建transforms.json
  status: pending
  summary: img_pos位姿+Tcl+Til → Nerfstudio格式transforms.json
  links:
  - pipeline-3dgs

- id: task-3dgs-train
  type: task
  title: 3DGS训练
  status: pending
  summary: Splatfacto训练，参考旧路线V22参数
  links:
  - pipeline-3dgs
  - asset-old-pipeline

- id: task-visualize
  type: task
  title: 可视化验证
  status: pending
  summary: CloudCompare/Open3D打开colorized_final.ply验证
  links:
  - pipeline-colorize
